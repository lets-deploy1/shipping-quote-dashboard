<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Quote Dashboard - Leading Edge Training Solutions</title>
    <link rel="stylesheet" href="styles.css">
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Leading Edge Training Solutions</h1>
            <h2>Shipping Quote Dashboard</h2>
        </div>
        <div class="filters">
            <div class="filter-group">
                <label for="date-from">Arrival Date From:</label>
                <input type="date" id="date-from">
                <span>to</span>
                <input type="date" id="date-to">
            </div>
            <div class="filter-group">
                <label for="kit-filter">Kit Number:</label>
                <select id="kit-filter">
                    <option value="all">All Kits</option>
                    <option value="1">Kit 1</option>
                    <option value="2">Kit 2</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="search">Search:</label>
                <input type="text" id="search" placeholder="Event ID, City, ZIP...">
            </div>
        </div>
    </header>

    <main>
        <div class="summary-bar">
            <span id="event-count">Loading...</span>
            <span id="last-updated">Last Updated: --</span>
        </div>

        <div class="events-container" id="events-container">
            <!-- Events will be loaded here by JavaScript -->
            <div class="no-events">
                <p>Loading shipping quotes...</p>
            </div>
        </div>
    </main>

    <footer>
        <p>Leading Edge Training Solutions &copy; 2026 | Shipping Quote Dashboard</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
